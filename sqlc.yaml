version: "2"

sql:
  - schema: "migrations/postgres"
    queries: "internal/repository/postgres/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/postgres/sqlc"
        emit_json_tags: true
        sql_package: pgx/v5
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
